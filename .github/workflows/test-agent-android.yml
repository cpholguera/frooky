name: Test frooky agent Android

on:
  push:
    paths:
      - 'frooky/agent/**'
  pull_request:
    branches: [main]
    paths:
      - 'frooky/agent/**'
  
permissions:
  contents: read

jobs:
  build-agent:
    uses: ./.github/workflows/build-agent.yml

  build-mas-app-android:
    uses: ./.github/workflows/build-mas-app-android.yml

  test-agent-android:
    name: Test frooky agent Android
    runs-on: ubuntu-latest
    needs: 
      - build-agent
      - build-mas-app-android
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app Android artifact
        uses: actions/download-artifact@v8
        with:
          name: mas-app-android
          path: mas-app-android

      - name: Download frooky agent artifact
        uses: actions/download-artifact@v8
        with:
          name: frooky-agent
          path: frooky/agent/dist

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: './frooky/agent/package-lock.json'

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: frooky/agent

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Frida
        run: |
          python -m pip install frida
          python -m pip install frida-tools

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "Generated AVD snapshot"

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            chmod +x .github/scripts/android/prep-device.sh
            chmod +x .github/scripts/android/install-frida-server.sh

            echo "Starting adb as root"
            .github/scripts/android/prep-device.sh

            echo "Installing frida server"
            .github/scripts/android/install-frida-server.sh

            echo "Installing MAS app Android"
            adb install mas-app-android/app-debug.apk

            echo "Running frooky agent tests"
            npm --prefix frooky/agent run test:android -- --appIdentifier org.owasp.mastestapp > test-results-android.txt
            cat test-results-android.txt
            cat test-results-android.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-android
          path: test-results-android.txt