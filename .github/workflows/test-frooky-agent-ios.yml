name: Test frooky agent iOS

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-frooky-agent:
    uses: ./.github/workflows/build-frooky-agent.yml

  build-mas-app-ios:
    uses: ./.github/workflows/build-mas-app-ios.yml

  test-frooky-agent-android:
    name: Test frooky agent iOS
    runs-on: ubuntu-latest
    needs: 
      - build-frooky-agent
      - build-mas-app-ios
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: mas-app-ios
          path: mas-app-ios

      - name: Download frooky agent artifact
        uses: actions/download-artifact@v8
        with:
          name: frooky-agent
          path: frooky/agent/dist