name: Test frooky agent iOS

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-mas-app-ios:
    uses: ./.github/workflows/build-mas-app-ios.yml

  test-frooky-agent-android:
    name: Test frooky agent iOS
    runs-on: macos-26
    needs: build-mas-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: mas-app-ios
          path: mas-app-ios

      - name: Download frooky agent artifact
        uses: actions/download-artifact@v8
        with:
          name: frooky-agent
          path: frooky/agent/dist

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: './frooky/agent/package-lock.json'

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: frooky/agent

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Frida
        run: |
          python -m pip install frida
          python -m pip install frida-tools

      - name: Boot iOS Simulator
        run: |         
          echo "Booting iPhone 17 simulator"
          xcrun simctl boot "iPhone 17"
          
          echo "Waiting for simulator to be ready"
          xcrun simctl bootstatus "iPhone 17" -b

      - name: Install app on simulator
        run: |
          APP_PATH=$(find "mas-app-ios" -name "*.app" -type d | head -1)

          echo "Installing app $APP_PATH on iPhone 17"
          xcrun simctl install "iPhone 17" "$APP_PATH"

      - name: Start app
        run: |
          APP_ID="org.owasp.mastestapp.MASTestApp-iOS"

          PID=$(xcrun simctl launch booted "$APP_ID" | awk '{print $2}')
          echo "Launched with PID $PID"

          for i in $(seq 1 10); do
            if kill -0 "$PID" 2>/dev/null; then
              echo "App is running (PID $PID)."
              exit 0
            fi
            echo "Attempt $i: app not running yet, retrying in 2s..."
            sleep 2
          done

          echo "App did not start within the timeout."
          exit 1


      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          npm --prefix frooky/agent run test:ios:local | tee test-results-ios.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios
          path: test-results-ios.txt