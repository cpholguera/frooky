      - name: Debug frooky install
        run: |
          which frooky
          frooky --version
          python -c "import frooky; import importlib.resources as r; print(list(r.files('frooky').joinpath('agent/dist').iterdir()))"

      - name: Run iOS integration tests
        run: |
          pytest tests/integration/ios 2>&1 | tee test-results.txt
          echo ${PIPESTATUS[0]} > exit-code.txt

      - name: Write summary and check result
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          exit_code=$(cat exit-code.txt)
          exit $exit_code          

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios
          path: test-results-ios.txt
