name: Test host iOS

on:
  push:

permissions:
  contents: read

jobs:
  build-host:
    uses: ./.github/workflows/build-host.yml

  build-app-ios:
    uses: ./.github/workflows/build-app-ios.yml

  test-host-ios:
    name: Test host iOS
    runs-on: macos-26
    needs:
      - build-host
      - build-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all MAS app iOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: target-apps-ios
          path: target-apps-ios

      - name: Setup Host Test Environment
        uses: ./.github/actions/setup-host-test-env

      - name: Setup Maestro
        uses: ./.github/actions/setup-maestro

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[]] | map(select(.isAvailable == true)) | first | .udid')
          echo "Booting simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install all target apps on simulator
        shell: bash
        run: .github/scripts/ios/install-target-apps.sh
          
      - name: Launch all target apps on simulator
        shell: bash
        run: .github/scripts/ios/launch-target-apps.sh

      - name: Run iOS integration tests
        run: pytest tests/integration/ios --report-log=test-results.jsonl

      - name: Summarize test result
        if: always()
        run: |
          jq -rn '
            [inputs | select(.$report_type == "TestReport" and .when == "call")] |
            .[] |
            "- \(if .outcome == "passed" then "✅" elif .outcome == "failed" then "❌" else "⏭️" end) `\(.nodeid)` (\(.duration | . * 100 | round / 100)s)"
          ' test-results.jsonl >> "$GITHUB_STEP_SUMMARY"
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.jsonl
