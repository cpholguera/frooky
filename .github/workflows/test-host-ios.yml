name: Test host iOS

on:
  push:

permissions:
  contents: read

jobs:
  build-host:
    uses: ./.github/workflows/build-host.yml

  build-app-ios:
    uses: ./.github/workflows/build-app-ios.yml
    with:
      app_dir: "mastg-demo-0026"

  test-host-ios:
    name: Test host iOS
    runs-on: macos-26
    needs:
      - build-host
      - build-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all MAS app iOS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: target-app-ios-*
          path: target-apps-ios
          merge-multiple: false

      - name: Setup Host Test Environment
        uses: ./.github/actions/setup-host-test-env

      - name: Setup Maestro
        uses: ./.github/actions/setup-maestro

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[]] | map(select(.isAvailable == true)) | first | .udid')
          echo "Booting simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install and run all apps on simulator
        run: |
          set -o pipefail

          for app in target-apps-ios/**/*.app; do
            echo "=== Installing $app ==="
            xcrun simctl install booted "$app"

            # Read bundle ID from the app's Info.plist
            APP_ID=$(defaults read "$(pwd)/$app/Info.plist" CFBundleIdentifier)
            echo "Launching $APP_ID"

            PID=$(xcrun simctl launch booted "$APP_ID" | awk '{print $2}')
            echo "Launched with PID $PID"

            for i in $(seq 1 10); do
              if kill -0 "$PID" 2>/dev/null; then
                echo "App is running (PID $PID)."
                break
              fi
              echo "Attempt $i: app not running yet, retrying in 2s..."
              sleep 2
              if [ "$i" -eq 10 ]; then
                echo "App $APP_ID did not start within the timeout."
                exit 1
              fi
            done
          done

      - name: Run iOS integration tests
        run: |
          pytest tests/integration/ios --report-log=test-results.jsonl

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.jsonl
