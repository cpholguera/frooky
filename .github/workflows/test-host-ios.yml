name: Test host iOS

on:
  push:

permissions:
  contents: read

jobs:
  build-host:
    uses: ./.github/workflows/build-host.yml

  build-app-ios:
    uses: ./.github/workflows/build-app-ios.yml
    with:
      app_dir: "mastg-demo-0067"

  test-host-ios:
    name: Test host iOS
    runs-on: macos-26
    needs:
      - build-host
      - build-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: target-app-ios
          path: target-app-ios

      - name: Setup Host Test Environment
        uses: ./.github/actions/setup-host-test-env

      - name: Setup Maestro
        uses: ./.github/actions/setup-maestro

