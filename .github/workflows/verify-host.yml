name: Verify Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-host:
    uses: ./.github/workflows/build-host.yml

  verify-host:
    runs-on: ubuntu-latest
    needs: build-host
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Download frooky agent artifact
        uses: actions/download-artifact@v8
        with:
          name: frooky-host
          path: dist

      - name: Test install from wheel
        run: |
          python -m pip install dist/*.whl
          frooky --help

      - name: Verify agent artifacts in wheel
        run: |
          unzip -l dist/*.whl | grep "frooky/agent/dist/agent-android.js"
          unzip -l dist/*.whl | grep "frooky/agent/dist/agent-ios.js"
          echo "All agent artifacts present in wheel"