name: Test host Android

on:
  push:

permissions:
  contents: read

jobs:
  build-host:
    uses: ./.github/workflows/build-host.yml

  build-app-android:
    uses: ./.github/workflows/build-app-android.yml

  test-host-android:
    name: Test host Android
    runs-on: ubuntu-latest
    needs:
      - build-host
      - build-app-android
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app Android artifact
        uses: actions/download-artifact@v8
        with:
          name: target-apps-android
          path: target-apps-android

      - name: Setup Host Test Environment
        uses: ./.github/actions/setup-host-test-env

      - name: Setup Maestro
        uses: ./.github/actions/setup-maestro

      - name: Setup Android emulator environment
        uses: ./.github/actions/setup-android-emulator
        with:
          api-level: "34"

      - name: Install Frida and all apps
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            chmod +x .github/scripts/android/prep-device.sh
            chmod +x .github/scripts/android/install-frida-server.sh
            chmod +x .github/scripts/android/install-target-apps.sh
            chmod +x .github/scripts/android/launch-target-apps.sh

            echo "Starting adb as root"
            .github/scripts/android/prep-device.sh

            echo "Installing frida server"
            .github/scripts/android/install-frida-server.sh

            echo "Installing target apps"
            .github/scripts/android/install-target-apps.sh

            echo "Launching all target apps"
            .github/scripts/android/launch-target-apps.sh
            
            echo "Running Android test"
            pytest tests/integration/android  --report-log=test-results.jsonl

            echo "Summarize test result"
            jq -rn '[inputs | select(."$report_type" == "TestReport" and .when == "call")] | .[] | "- \(if .outcome == "passed" then "✅" elif .outcome == "failed" then "❌" else "⏭️" end) \(.nodeid) (\(.duration | . * 100 | round / 100)s)"' test-results.jsonl  >> "$GITHUB_STEP_SUMMARY"    

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.jsonl
