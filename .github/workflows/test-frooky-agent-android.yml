name: Test frooky agent Android

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-frooky-agent:
    uses: ./.github/workflows/build-frooky-agent.yml

  build-mas-app-android:
    uses: ./.github/workflows/build-mas-app-android.yml

  test-frooky-agent-android:
    name: Test frooky agent Android
    runs-on: ubuntu-latest
    needs: 
      - build-frooky-agent
      - build-mas-app-android
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: frooky-agent
          path: frooky/agent/dist

      - uses: actions/download-artifact@v8
        with:
          name: mas-app-android
          path: test-apps/mas-app-android

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: './frooky/agent/package-lock.json'

      - run: npm ci
        working-directory: frooky/agent

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - run: |
          python -m pip install frida
          python -m pip install frida-tools

      - run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          
      - name: Cache AVD snapshot
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "Generated AVD snapshot"

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            chmod +x .github/scripts/android/prep-device.sh
            chmod +x .github/scripts/android/install-frida-server.sh

            echo "Starting adb as root"
            .github/scripts/android/prep-device.sh

            echo "Installing frida server"
            .github/scripts/android/install-frida-server.sh

            echo "Installing MAS app Android"
            adb install test-apps/mas-app-android/app-debug.apk

            echo "Running frooky agent tests"
            npm --prefix frooky/agent run test:android
