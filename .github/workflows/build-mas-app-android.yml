name: Build MAS app Android

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-mas-app-android:
    name: Build MAS app Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Build debug APK (empty mas-app-android)
        working-directory: tests/target-apps/android
        run: make build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: target-app-android
          path: tests/target-apps/android/dist/MASTestApp.apk
