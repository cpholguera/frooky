name: Build MAS App Android

on: [push]

# on:
#   push:
#     paths:
#       - 'test-apps/mas-app-android/**'
#   pull_request:
#     paths:
#       - 'test-apps/mas-app-android/**'
#   workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: test-apps/mas-app-android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: test-apps/mas-app-android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: mas-app-android
          path: test-apps/mas-app-android/app/build/outputs/apk/debug/app-debug.apk