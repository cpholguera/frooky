name: Build MAS app Android

on:
  push:
    paths:
      - 'test-apps/mas-app-android/**'
  workflow_call:

permissions:
  contents: read

jobs:
  build-mas-app-android:
    name: Build MAS app Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Build debug APK
        working-directory: test-apps/mas-app-android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: mas-app-android
          path: test-apps/mas-app-android/app/build/outputs/apk/debug/app-debug.apk
