name: Build frooky agent

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "frooky agent (JavaScript)"
        value: ${{ jobs.build-agent.outputs.artifact-name }}

jobs:
  build-frooky-agent:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: './frooky/agent/package-lock.json'
      - run: chmod +x compileAgent.sh
      - run: ./compileAgent.sh --prod
      - uses: actions/upload-artifact@v4
        id: upload
        with:
          name: agent-dist
          path: dist/*