name: Build frooky Host

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "frooky host (python)"
        value: ${{ jobs.build-python.outputs.artifact-name }}

jobs:
  build-agent:
    uses: ./.github/workflows/build-agent.yml

  build-python:
    needs: build-agent
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-agent.outputs.artifact-name }}
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        id: upload
        with:
          name: dist
          path: dist/*
