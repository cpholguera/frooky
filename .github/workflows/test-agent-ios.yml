name: Test agent iOS

on:
  push:
    paths:
      - 'frooky/agent/**'

permissions:
  contents: read

jobs:
  build-app-ios:
    uses: ./.github/workflows/build-app-ios.yml

  test-agent-ios:
    name: Test agent iOS
    runs-on: macos-26
    needs: build-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: target-apps-ios
          path: target-apps-ios

      - name: Setup Agent Test Environment
        uses: ./.github/actions/setup-agent-test-env

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[]] | map(select(.isAvailable == true)) | first | .udid')
          echo "Booting simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install all target apps on simulator
        shell: bash
        run: .github/scripts/ios/install-target-apps.sh
          
      - name: Launch all target apps on simulator
        shell: bash
        run: .github/scripts/ios/launch-target-apps.sh

      - name: Run tests
        shell: bash
        run: npm --prefix frooky/agent run test:ios:local -- -i basic_parameter.frooky.target.app -o test-results.txt

      - name: Summarize test result
        if: always()
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat frooky/agent/test-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: frooky/agent/test-results.txt
