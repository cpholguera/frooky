name: Test agent iOS

on:
  push:
    paths:
      - 'frooky/agent/**'

permissions:
  contents: read

jobs:
  build-app-ios:
    uses: ./.github/workflows/build-app-ios.yml
    with:
      app_dir: mastg-demo-0067

  test-agent-ios:
    name: Test agent iOS
    runs-on: macos-26
    needs: build-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: target-apps-ios
          path: target-apps-ios

      - name: Setup Agent Test Environment
        uses: ./.github/actions/setup-agent-test-env

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[]] | map(select(.isAvailable == true)) | first | .udid')
          echo "Booting simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install and run all apps on simulator
        run: |
          set -eo pipefail
          for app in target-apps-ios/*.app; do
            [ -d "$app" ] || { echo "No .app bundles found, skipping."; continue; }

            TARGET_APP=$(basename "$app")
            APP_ID="${TARGET_APP//-/_}.mastestapp"

            echo "=== Installing $app (bundle ID: $APP_ID) ==="
            xcrun simctl install booted "$app"

            PID=$(xcrun simctl launch booted "$APP_ID" | awk '{print $2}')
            echo "Launched with PID $PID"

            for i in $(seq 1 10); do
              if kill -0 "$PID" 2>/dev/null; then
                echo "App $APP_ID is running (PID $PID)."
                break
              fi
              echo "Attempt $i: app not running yet, retrying in 2s..."
              sleep 2
              if [ "$i" -eq 10 ]; then
                echo "ERROR: App $APP_ID did not start within the timeout."
                exit 1
              fi
            done
          done

      - name: Run tests
        shell: bash
        run: |
          npm --prefix frooky/agent run test:ios:local -- --out test-results.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.txt
