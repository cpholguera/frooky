name: Test agent iOS

on:
  push:
    paths:
      - "frooky/agent/**"

permissions:
  contents: read

jobs:
  build-app-ios:
    uses: ./.github/workflows/build-app-ios.yml

  test-agent-ios:
    name: Test agent iOS
    runs-on: macos-26
    needs: build-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: target-apps-ios
          path: target-apps-ios

      - name: Setup Agent Test Environment
        uses: ./.github/actions/setup-agent-test-env

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[]] | map(select(.isAvailable == true)) | first | .udid')
          echo "Booting simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install and run all apps on simulator
        run: |
          set -eo pipefail
          shopt -s nullglob

          apps=(target-apps-ios/*.app)
          if [ ${#apps[@]} -eq 0 ]; then
            echo "ERROR: No .app bundles found."
            find target-apps-ios -print
            exit 1
          fi

          for app in "${apps[@]}"; do
            APP_ID=$(defaults read "$(pwd)/$app/Info.plist" CFBundleIdentifier)
            echo "=== Installing $app (bundle ID: $APP_ID) ==="
            xcrun simctl install booted "$app"

            PID=$(xcrun simctl launch booted "$APP_ID" | awk '{print $2}')
            echo "Launched with PID $PID"

            for i in $(seq 1 10); do
              if kill -0 "$PID" 2>/dev/null; then
                echo "App $APP_ID is running (PID $PID)."
                break
              fi
              echo "Attempt $i: app not running yet, retrying in 2s..."
              sleep 2
              if [ "$i" -eq 10 ]; then
                echo "ERROR: App $APP_ID did not start within the timeout."
                exit 1
              fi
            done
          done

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail

          APP_ID="org.owasp.mastestapp.MASTestApp-iOS"

          PID=$(xcrun simctl launch booted "$APP_ID" | awk '{print $2}')
          echo "Launched with PID $PID"

          npm --prefix frooky/agent run test:ios:local -- --appIdentifier $PID 2>&1 | tee test-results.txt
          echo ${PIPESTATUS[0]} > exit-code.txt

      - name: Write summary and check result
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          exit_code=$(cat exit-code.txt)
          exit $exit_code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios
          path: test-results-ios.txt
