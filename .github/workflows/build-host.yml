name: Build frooky host

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-agent:
    uses: ./.github/workflows/build-agent.yml

  build-frooky-host:
    name: Build frooky host
    needs: build-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download frooky agent artifact
        uses: actions/download-artifact@v6
        with:
          name: frooky-agent
          path: frooky/agent/dist

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tool
        run: python -m pip install --upgrade build

      - name: Build frooky package
        run: python -m build

      - name: Check build artifacts
        run: |
          ls -lh dist/
          test -f dist/*.whl
          test -f dist/*.tar.gz

      - name: Upload frooky host artifact
        uses: actions/upload-artifact@v7
        with:
          name: frooky-host
          path: dist/*
