name: Build MAS app iOS

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-mas-app-ios:
    name: Build MAS app iOS
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build iOS app (empty mas-app-ios)
        working-directory: tests/target-apps/ios
        run: make build
        
      - name: Upload MAS app iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: target-app-ios
          path: tests/target-apps/ios/dist/MASTestApp.app