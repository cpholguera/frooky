name: Test host integration iOS

on:
  push:
  
permissions:
  contents: read

jobs:
  build-host:
    uses: ./.github/workflows/build-host.yml

  build-app-ios:
    uses: ./.github/workflows/build-app-ios.yml
    with:
      app_dir: "tests/target-apps/ios/mastg-demo-0067"

  test-host-ios:
    name: Test host iOS
    runs-on: macos-26
    needs: 
      - build-host
      - build-app-ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download MAS app iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: target-app-ios
          path: target-app-ios

      - name: Boot simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[]] | map(select(.isAvailable == true)) | first | .udid')
          echo "Booting simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

      - name: Install app on simulator
        run: xcrun simctl install booted target-app-ios/MASTestApp.app

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail

          APP_ID="org.owasp.mastestapp.MASTestApp-iOS"

          PID=$(xcrun simctl launch booted "$APP_ID" | awk '{print $2}')
          echo "Launched with PID $PID"

          for i in $(seq 1 10); do
            if kill -0 "$PID" 2>/dev/null; then
              echo "App is running (PID $PID)."

              echo "TBD: run integration tests for iOS"

              exit 0
            fi
            echo "Attempt $i: app not running yet, retrying in 2s..."
            sleep 2
          done

          echo "App did not start within the timeout."
          exit 1
         

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios
          path: test-results-ios.txt