name: Setup Test Environment for Hosts
description: Download the current frooky host and install it
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Download host artifact
      uses: actions/download-artifact@v8
      with:
        name: frooky-host
        path: dist

    - name: Install frooky
      shell: bash
      run: python -m pip install dist/*.whl

    - name: Install dev dependencies
      shell: bash
      run: python -m pip install "pytest>=8.0.0" "pytest-cov>=4.1.0" "pylint-pytest>=1.1.8"