name: Setup Android Runtime
description: Enables KVM and starts an Android emulator

inputs:
  api-level:
    description: Android API level
    default: "34"
  script:
    description: Script to run inside the emulator context
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/download-artifact@v6
      with:
        name: frooky-agent
        path: frooky/agent/dist

    - uses: actions/download-artifact@v6
      with:
        name: mas-app-android
        path: test-apps/mas-app-android

    - uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: 'npm'
        cache-dependency-path: './frooky/agent/package-lock.json'

    - run: npm ci
      working-directory: frooky/agent


      

    - name: Enable KVM
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Start Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ inputs.api-level }}
        target: google_apis
        arch: x86_64
        emulator-options: -wipe-data -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
        disable-animations: true
        script: ${{ inputs.script }}