metadata:
  name: Android Hook Examples
  platform: Android
  description: Examples of Java/Kotlin method hooking on Android
  category: GENERAL
  author: frooky dev team
  version: v1

hooks:
  # Simple method hooking with a list of methods to be hooked.
  # All overloads of the methods are hooked implicitly.
  # Docs: https://developer.android.com/reference/android/security/AttestedKeyPair
  - javaClass: android.security.AttestedKeyPair
    methods:
      - $init
      - getKeyPair

  # Simple method hooking.
  # Here, methods is a list of objects, with the methods name in the `name` property.
  # It is not required to use an object if there are no overloads, but possible.
  # The stack trace is limited to 10.
  # Docs: https://developer.android.com/reference/android/security/AttestedKeyPair
  - javaClass: android.security.AttestedKeyPair
    methods:
      - name: $init
      - name: getKeyPair
    stackTraceLimit: 10

  # Explicit hooking of a single overloaded method.
  # The parameter of the method is just a list of types ("Unnamed Parameter").
  # Docs: https://developer.android.com/reference/java/net/URL#openConnection(java.net.Proxy)
  - javaClass: java.net.URL
    methods:
      - name: openConnection
        overloads:
          - params:
              - java.net.Proxy

  # Explicit hooking of a single overloaded method.
  # The parameters of the method is a list of type and name stored
  # in the list `params` ("Named Parameter").
  # With the names of the argument, frooky is now able to add them as context
  # information when decoding the values.
  # Docs: https://developer.android.com/reference/android/app/Activity#startActivity(android.content.Intent)
  - javaClass: android.app.Activity
    methods:
      - name: startActivity
        overloads:
          - params:
              - ["android.content.Intent", intent]

  # Explicit hooking of a single overloaded method.
  # The overloaded method has 7 parameters.
  # The `stackTraceFilter` excludes (`^`) events which root in a function call coming
  # from `java.**` or `android.**`. This can be handy if we only want to see events
  # originating from the package name of our target app and not by a third party lib.
  # The stack trace is limited to 5.
  # Docs: https://developer.android.com/reference/android/database/sqlite/SQLiteDatabase#query(java.lang.String,%20java.lang.String[],%20java.lang.String,%20java.lang.String[],%20java.lang.String,%20java.lang.String,%20java.lang.String)
  - javaClass: android.database.sqlite.SQLiteDatabase
    methods:
      - name: query
        overloads:
          - params:
              - ["java.lang.String", table]
              - ["[Ljava.lang.String", columns]
              - ["java.lang.String", selection]
              - ["[Ljava.lang.String", selectionArgs]
              - ["java.lang.String", groupBy]
              - ["java.lang.String", having]
              - ["java.lang.String", orderBy]
    stackTraceLimit: 5
    stackTraceFilter:
      - "$^java\\."
      - "$^android\\."
      - "$^com\\.external\\.sdk\\."

  # Explicit hooking of 4 overloaded methods.
  # The parameters of the method is a list of type and name stored in the list `params`.
  # Docs: https://developer.android.com/reference/android/content/Intent
  - javaClass: android.content.Intent
    methods:
      - name: putExtra
        overloads:
          - params:
              - ["java.lang.String", name]
              - ["java.lang.String", value]
          - params:
              - ["java.lang.String", name]
              - [int, value]
          - params:
              - ["java.lang.String", name]
              - [boolean, value]
          - params:
              - ["java.lang.String", name]
              - ["[B", value]

  # Explicit hooking of a single overloaded method.
  # The parameter `flags` contains an integer which contains information about the
  # intent settings using bit-masking.
  # The decoder `IntentFlagsDecoder` decodes them during runtime based on the
  # constants stored in `android.content.Intent`.
  # The `debug` flag additionally adds debug messages while the method `setFlags`
  # is hooked and its arguments and/or return values decoded.
  # Docs: https://developer.android.com/reference/android/content/Intent#setFlags(int)
  - javaClass: android.content.Intent
    methods:
      - name: setFlags
        overloads:
          - params:
              - [int, flags, { decoder: IntentFlagsDecoder }]
    debug: true

  # The decrypted plaintext is written into the byte array `output`, which is passed by reference,
  # after the function completes. Hence, we decode it at exit.
  # Docs: https://developer.android.com/reference/javax/crypto/Cipher#doFinal(byte[],%20int)
  - javaClass: javax.crypto.Cipher
    methods:
      - name: doFinal
        overloads:
          - params:
              - ["[B", output, { decodeAt: exit }]
              - [int, outputOffset]

  # If we want to decode a value both before and after the method is completed, we can
  # use `{ decodeAt: both }`.
  # Docs: https://developer.android.com/reference/java/nio/ByteBuffer#put(byte[])
  - javaClass: java.nio.ByteBuffer
    methods:
      - name: put
        overloads:
          - params:
              - ["[B", src, { decodeAt: both }]
