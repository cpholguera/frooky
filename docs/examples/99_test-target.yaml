metadata:
  name: Android Hooks for Testing
  version: 1
  author: frooky dev
  platform: Android

hooks:
  # - javaClass: android.content.Intent 
  #   methods:
  #     - putExtra

  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passString
      - passBoolean
      - passByte
      - passShort
      - passInt
      - passLong
      - passFloat
      - passDouble
      - passChar
      - passBigInteger
      - passBigDecimal
      - passList
      - passMap
      - passSet
      - passEnum
      - passStringArray
      - passBooleanArray
      - passByteArray
      - passShortArray
      - passIntArray
      - passLongArray
      - passFloatArray
      - passDoubleArray
      - passCharArray
  

