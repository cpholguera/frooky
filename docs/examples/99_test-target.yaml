metadata:
  name: Android Hooks for Testing
  version: 1
  author: frooky dev
  platform: Android

hooks:
    # java primitive types
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passBoolean
      - passByte
      - passShort
      - passInt
      - passLong
      - passFloat
      - passDouble
      - passChar

    # java types which are converted to "string" type in javascript
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passString


  # primitive java arrays
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passStringArray
      - passBooleanArray
      - passByteArray
      - passShortArray
      - passIntArray
      - passLongArray
      - passFloatArray
      - passDoubleArray
      - passCharArray

  # complex common java types
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passBigInteger
      - passBigDecimal
      - passList
      - passMap
      - passSet
      - passEnum

  - javaClass: androidx.security.crypto.EncryptedSharedPreferences$Editor
    stackTraceLimit: 0
    methods:
      - putString
      - putStringSet

  # 3 different overloads with different ways of param declaration 
  - javaClass: android.content.Intent 
    methods:
      - name: $init
        overloads:
          - params:
            - android.content.Intent
          - params: 
            - [ android.content.Context, packageContext]
            - [ java.lang.Class, cls]
          - params:
            - { type: java.lang.String, name: action}
            - android.net.Uri

  - javaClass: android.content.Intent 
    stackTraceLimit: 0
    methods:
      - name: setFlags
        overloads:
          - params:
            - [int, flags, { decoder: android.content.IntentFlagDecoder }]


  - javaClass: java.security.KeyPairGenerator
    stackTraceLimit: 0
    methods:
      - initialize
                  
  - javaClass: android.app.Activity 
    methods:
      - startActivity

  - module: libcrypto.so
    functions:
      - X509_new
      - symbol: RSA_parse_public_key
      - EVP_EncryptUpdate
      - HMAC
      - RSA_public_encrypt
      - EVP_DecryptUpdate
      - EVP_DigestUpdate


# pass by value
  - module: libprimitives.so
    stackTraceLimit: 0
    functions:
      - symbol: pass_bool
        params: [bool]
      - symbol: pass_char
        params: [char]
      - symbol: pass_schar
        params: [schar]
      - symbol: pass_uchar
        params: [uchar]
      - symbol: pass_short
        params: [short]
      - symbol: pass_ushort
        params: [ushort]
      - symbol: pass_int
        params: [int]
      - symbol: pass_uint
        params: [uint]
      - symbol: pass_long
        params: [long]
      - symbol: pass_ulong
        params: [ulong]
      - symbol: pass_llong
        params: [llong]
      - symbol: pass_ullong
        params: [ullong]
      - symbol: pass_float
        params: [float]
      - symbol: pass_double
        params: [double]

# pass by reference
  - module: libprimitives.so
    stackTraceLimit: 0
    functions:
      - symbol: pass_bool_ref
        params: [bool*]
      - symbol: pass_char_ref
        params: [char*]
      - symbol: pass_schar_ref
        params: [schar*]
      - symbol: pass_uchar_ref
        params: [uchar*]
      - symbol: pass_short_ref
        params: [short*]
      - symbol: pass_ushort_ref
        params: [ushort*]
      - symbol: pass_int_ref
        params: [int*]
      - symbol: pass_uint_ref
        params: [uint*]
      - symbol: pass_long_ref
        params: [long*]
      - symbol: pass_ulong_ref
        params: [ulong *]
      - symbol: pass_llong_ref
        params: [llong *]
      - symbol: pass_ullong_ref
        params: [ullong *]
      - symbol: pass_float_ref
        params: [float *]
      - symbol: pass_double_ref
        params: [double *]