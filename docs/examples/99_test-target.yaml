metadata:
  name: Android Hooks for Testing
  version: 1
  author: frooky dev
  platform: Android

hooks:
    # java primitive types
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passBoolean
      - passByte
      - passShort
      - passInt
      - passLong
      - passFloat
      - passDouble
      - passChar

    # java types which are converted to "string" type in javascript
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passString


  # primitive java arrays
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passStringArray
      - passBooleanArray
      - passByteArray
      - passShortArray
      - passIntArray
      - passLongArray
      - passFloatArray
      - passDoubleArray
      - passCharArray

  # complex common java types
  - javaClass: org.owasp.mastestapp.MastgTest
    stackTraceLimit: 0
    methods:
      - passBigInteger
      - passBigDecimal
      - passList
      - passMap
      - passSet
      - passEnum

  - javaClass: androidx.security.crypto.EncryptedSharedPreferences$Editor
    stackTraceLimit: 0
    methods:
      - putString
      - putStringSet

  # 3 different overloads with different ways of param declaration 
  - javaClass: android.content.Intent 
    methods:
      - name: $init
        overloads:
          - params:
            - android.content.Intent
          - params: 
            - [ android.content.Context, packageContext]
            - [ java.lang.Class, cls]
          - params:
            - { type: java.lang.String, name: action}
            - android.net.Uri

  - javaClass: android.content.Intent 
    stackTraceLimit: 0
    methods:
      - name: setFlags
        overloads:
          - params:
            - [int, flags, { decoder: android.content.IntentFlagDecoder }]


  - javaClass: java.security.KeyPairGenerator
    stackTraceLimit: 0
    methods:
      - initialize
                  
  - javaClass: android.app.Activity 
    methods:
      - startActivity

  - module: libcrypto.so
    functions:
      - X509_new
      - symbol: RSA_parse_public_key
      - EVP_EncryptUpdate
      - HMAC
      - RSA_public_encrypt
      - EVP_DecryptUpdate
      - EVP_DigestUpdate

