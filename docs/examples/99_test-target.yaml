metadata:
  name: Android Hooks for Testing
  version: 1
  author: frooky dev
  platform: Android

# global settings for the hooks in this hook file.
globalSettings:
  stackTraceLimit: 10           # Sets stackTraceLimit to 10 for all hooks
  disableStacktrace: false      # If set, disables the stack trace 
  decoderSettings:
    fastDecode: false             # If set, the decoders are instructed to prioritize speed over details. Mostly, this mean avoiding expensive Frida <-> native roundtrip.
    magicDecode: true             # If set, frooky tries to guess the type of a value in case it is not declared in the hook, or it is not possible to deduct it at runtime
    maxRecursion: 10              # Sets the cutoff limit for the recursion depth when decoding nested data structures, such as nested arrays, lists, sets, maps, structs etc.
    elementLimit: 1000            # Sets the limit of how many elements of a enumerable data structures, such as arrays, lists, dictionaries etc. are decoded

hooks:
    # java primitive types
  - javaClass: org.owasp.mastestapp.MastgTest
    methods:
      - receiveBoolean
      - receiveByte
      - receiveShort
      - receiveInt
      - receiveLong
      - receiveFloat
      - receiveDouble
      - receiveChar

    # java types which are converted to "string" type in javascript
  - javaClass: org.owasp.mastestapp.MastgTest
    methods:
      - receiveString


  # primitive java arrays
  - javaClass: org.owasp.mastestapp.MastgTest
    methods:
      - receiveStringArray
      - receiveBooleanArray
      - receiveByteArray
      - receiveShortArray
      - receiveIntArray
      - receiveLongArray
      - receiveFloatArray
      - receiveDoubleArray
      - receiveCharArray
      - receiveNestedPrimitivesArray
      - receiveNestedObjectArray

  # complex common java types
  - javaClass: org.owasp.mastestapp.MastgTest
    methods:
      - receiveBigInteger
      - receiveBigDecimal
      - receiveList
      - receiveMap
      - receiveSet
      - receiveEnum

  - javaClass: androidx.security.crypto.EncryptedSharedPreferences$Editor
    methods:
      - putString
      - putStringSet

  # 3 different overloads with different ways of param declaration 
  - javaClass: android.content.Intent 
    methods:
      - name: $init
        overloads:
          - params:
            - android.content.Intent
          - params: 
            - [ android.content.Context, packageContext]
            - [ java.lang.Class, cls]
          - params:
            - { type: java.lang.String, name: action}
            - android.net.Uri

  - javaClass: android.content.Intent 
    methods:
      - name: setFlags
        overloads:
          - params:
            - [int, flags, { decoder: android.content.IntentFlagDecoder }]


  - javaClass: java.security.KeyPairGenerator
    methods:
      - initialize
                  
  - javaClass: android.app.Activity 
    methods:
      - startActivity

  - module: libcrypto.so
    functions:
      - X509_new
      - symbol: RSA_parse_public_key
      - EVP_EncryptUpdate
      - HMAC
      - RSA_public_encrypt
      - EVP_DecryptUpdate
      - EVP_DigestUpdate


# decode arguments passed by value
  - module: libreceiveFundamentalValue.so
    functions:
      - symbol: receive_bool
        params:
          - [bool, falseBool]
          - [bool, trueBool]
      - symbol: receive_char
        params:
          - [char, minAscii]
          - [char, maxAscii]
      - symbol: receive_schar
        params:
          - [schar, minSchar]
          - [schar, maxSchar]
      - symbol: receive_uchar
        params:
          - [uchar, minUchar]
          - [uchar, maxUchar]
      - symbol: receive_short
        params:
          - [short, minShort]
          - [short, maxShort]
      - symbol: receive_ushort
        params:
          - [ushort, minUshort]
          - [ushort, maxUshort]
      - symbol: receive_int
        params:
          - [int, minInt]
          - [int, maxInt]
      - symbol: receive_uint
        params:
          - [uint, minUint]
          - [uint, maxUint]
      - symbol: receive_long
        params:
          - [long, minLong]
          - [long, maxLong]
      - symbol: receive_ulong
        params:
          - [ulong, minUlong]
          - [ulong, maxUlong]
      - symbol: receive_llong
        params:
          - [llong, minLlong]
          - [llong, maxLlong]
      - symbol: receive_ullong
        params:
          - [ullong, minUllong]
          - [ullong, maxUllong]
      - symbol: receive_float
        params:
          - [float, minFloat]
          - [float, maxFloat]
      - symbol: receive_double
        params:
          - [double, minDouble]
          - [double, maxDouble]

# decode arguments passed by reference
  - module: libreceiveFundamentalReference.so
    functions:
      - symbol: receive_bool_ref
        params:
          - [bool*, falseBoolRef]
          - [bool*, trueBoolRef]
      - symbol: receive_char_ref
        params:
          - [char*, minAsciiRef]
          - [char*, maxAsciiRef]
      - symbol: receive_schar_ref
        params:
          - [schar*, minScharRef]
          - [schar*, maxScharRef]
      - symbol: receive_uchar_ref
        params:
          - [uchar*, minUcharRef]
          - [uchar*, maxUcharRef]
      - symbol: receive_short_ref
        params:
          - [short*, minShortRef]
          - [short*, maxShortRef]
      - symbol: receive_ushort_ref
        params:
          - [ushort*, minUshortRef]
          - [ushort*, maxUshortRef]
      - symbol: receive_int_ref
        params:
          - [int*, minIntRef]
          - [int*, maxIntRef]
      - symbol: receive_uint_ref
        params:
          - [uint*, minUintRef]
          - [uint*, maxUintRef]
      - symbol: receive_long_ref
        params:
          - [long*, minLongRef]
          - [long*, maxLongRef]
      - symbol: receive_ulong_ref
        params:
          - [ulong*, minUlongRef]
          - [ulong*, maxUlongRef]
      - symbol: receive_llong_ref
        params:
          - [llong*, minLlongRef]
          - [llong*, maxLlongRef]
      - symbol: receive_ullong_ref
        params:
          - [ullong*, minUllongRef]
          - [ullong*, maxUllongRef]
      - symbol: receive_float_ref
        params:
          - [float*, minFloatRef]
          - [float*, maxFloatRef]
      - symbol: receive_double_ref
        params:
          - [double*, minDoubleRef]
          - [double*, maxDoubleRef]

# decode argument: null terminated string 
  - module: libreceiveString.so
    settings:
      decoderSettings:
        magicDecode: false
    functions:
      - symbol: receive_cstring
        params:
          - [char *, string]
      - symbol: receive_utf8
        params:
          - [ char *, {decodeAt: exit, magicDecode: true}]
