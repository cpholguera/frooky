metadata:
  name: Android Hooks for Testing
  version: 1
  author: frooky dev
  platform: Android

hooks:
  - javaClass: java.net.URL
    methods:
      - name: openConnection
        overloads:
          - params:
              - [ java.net.Proxy, proxy ] 

  - javaClass: androidx.security.crypto.EncryptedSharedPreferences$Editor
    methods:
      - name: putString
        overloads:
          - params:
            - java.lang.String
            - [ java.lang.String, value ]
      - putStringSet
  
