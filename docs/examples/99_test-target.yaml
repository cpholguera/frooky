metadata:
  name: Android Hook Examples
  asdfasdf: 234234
  somethignelse: "3423"

hooks:
  - javaClass: java.net.URL
    methods:
      - name: openConnection
        overloads:
          - params:
              - [ java.net.Proxy, proxy ] 

  - javaClass: androidx.security.crypto.EncryptedSharedPreferences$Editor
    methods:
      - name: putString
        overloads:
          - params:
            - java.lang.String
            - [ java.lang.String, value ]
      - putStringSet
  
  - javaClass: android.app.Activity 
    methods:
      - startActivity

  - module: libcrypto.so
    functions:
      - ENGINE_load_builtin_engines
      - symbol: EVP_cleanup
   