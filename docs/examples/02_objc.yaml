metadata:
  name: Objective-C Hook Examples
  platform: iOS
  description: Examples of Objective-C method hooking
  category: GENERAL
  author: frooky dev team
  version: v1

hooks:
  # Simple method hooking with a list of methods to be hooked.
  # Docs: https://developer.apple.com/documentation/localauthentication/lacontext/invalidate()?language=objc
  - objcClass: LAContext
    methods:
      - "- invalidate"

  # The same method hooking, but with declared as a list of objects,
  # with the methods name in the `name` property.
  # Docs: https://developer.apple.com/documentation/localauthentication/lacontext/invalidate()?language=objc
  - objcClass: LAContext
    methods:
      - name: "- invalidate"

  # Simple Objective-C instance method, indicated by the leading "-".
  # The parameters are declared, but not named ("Unnamed Parameter").
  # In order to decode the arguments, they are required.
  # Docs: https://developer.apple.com/documentation/foundation/userdefaults/set(_:forkey:)-8ab6d?language=objc
  - objcClass: NSUserDefaults
    methods:
      - name: "- setObject:forKey:"
        params:
          - "(id)"
          - "(NSString *)"

  # The same hook, but with named parameters.
  # frooky can use them to produce better output, as it is now possible to
  # describe the arguments at runtime ("Named Parameter").
  # Docs: https://developer.apple.com/documentation/foundation/userdefaults/set(_:forkey:)-8ab6d?language=objc
  - objcClass: NSUserDefaults
    methods:
      - name: "- setObject:forKey:"
        params:
          - ["(id)", value]
          - ["(NSString *)", key]

  # Hook with a `returnType`. frooky will decode the return value as boolean.
  # Docs: https://developer.apple.com/documentation/foundation/nsdata/write(tofile:atomically:)?language=objc
  - objcClass: NSData
    methods:
      - name: "- writeToFile:atomically:"
        returnType: "(BOOL)"
        params:
          - ["(NSString *)", path]
          - ["(BOOL)", useAuxiliaryFile]
    stackTraceLimit: 8

  # Simple Objective-C class method, indicated by the leading "+".
  # Docs: https://developer.apple.com/documentation/foundation/nsurl/fileurl(withfilesystemrepresentation:isdirectory:relativeto:)?language=objc
  - objcClass: NSURL
    methods:
      - name: "+ fileURLWithFileSystemRepresentation:isDirectory:relativeToURL:"
        returnType: "(NSURL *)"
        params:
          - ["(const char *)", path]
          - ["(BOOL)", isDir]
          - ["(NSURL *)", baseURL]

  # Multiple methods in same class hooked.
  # Docs: https://developer.apple.com/documentation/localauthentication/laprivatekey/decrypt(_:algorithm:completion:)?language=objc
  # Docs: https://developer.apple.com/documentation/localauthentication/laprivatekey/sign(_:algorithm:completion:)?&language=objc
  - objcClass: LAPrivateKey
    methods:
      - name: "- decryptData:secKeyAlgorithm:completion:"
        params:
          - ["(NSData *)", data]
          - ["(SecKeyAlgorithm)", algorithm]
          - [
              "(void (^)(NSData *, NSError *))",
              handler,
              { decoder: LaPlaintextDecoder },
            ]
      - name: "- signData:secKeyAlgorithm:completion:"
        params:
          - ["(NSData *)", data]
          - ["(SecKeyAlgorithm)", algorithm]
          - ["(void (^)(NSData *, NSError *))", handler]

  # The argument `error` is decoded after the method terminated.
  # Also, frooky will show debug information while running the hook.
  # Docs: https://developer.apple.com/documentation/CoreData/NSManagedObjectContext/save()?language=objc
  - objcClass: NSManagedObjectContext
    methods:
      - name: "- save:"
        returnType: "(BOOL)"
        params:
          - ["(NSError **)", error, { decodeAt: exit }]
    debug: true

  # Network request with stack trace filtering.
  # frooky won't keep events not originating from `libsystem_` and `Foundation*`.
  # Docs: https://developer.apple.com/documentation/foundation/urlsession/datatask(with:completionhandler:)-e6xv?language=objc
  - objcClass: NSURLSession
    methods:
      - name: "- dataTaskWithRequest:completionHandler:"
        returnType: "(NSURLSessionDataTask *)"
        params:
          - ["(NSURLRequest *)", request]
          - [
              "(void (^)(NSData *, NSURLResponse *, NSError *))",
              completionHandler,
            ]
    stackTraceFilter:
      - "^(?!Foundation)"
      - "^(?!libsystem_)"

  # If we want to decode a value both before and after the method is completed, we can
  # use `{ decodeAt: both }`.
  # Docs: https://developer.apple.com/documentation/foundation/nsmutabledata/append(_:)?language=objc
  - objcClass: NSMutableData
    methods:
      - name: "- appendData:"
        params:
          - ["(NSData *)", data, { decodeAt: both }]
