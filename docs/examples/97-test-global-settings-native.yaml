metadata:
  name: Test Settings Native
  description: |
    This frooky config uses different kind of settings:

      1. Global Settings

        Global settings can be of the type `HookSettings` and `DecoderSettings`. They apply to all hooks and their decoders (Parameter and Return Type), if they are not already set locally.

        Example: 

        ```
        globalSettings
          hookSettings:
            hookTimeout:     1
            stackTraceLimit: 10
            eventFilter: ['^(?!android).*']
          decoderSettings:
            fastDecode: true
            magicDecode: true 
            maxRecursion: 5
            decodeLimit: 100
        ``` 

      2. Hook and Decoder Settings 

        Hook and decoder settings define the behavior of the local hook.

        Example: 
        
        ```
        <specific-hook>
          hookSettings:
            hookTimeout:     1
            stackTraceLimit: 10
            eventFilter: ['^(?!android).*']
          decoderSettings:
            fastDecode: true
            magicDecode: true 
            maxRecursion: 5
            decodeLimit: 100
        ```

      3. Parameter Settings

        Parameter settings (`ParamSettings`) define when a parameter is decoded (`decodeAt`), as well as the settings defined in `DecoderSettings`.

        Example: 
        
        ```
        decodeAt: exit
        fastDecode: true
        magicDecode: true 
        maxRecursion: 5
        decodeLimit: 100
        ```

      4. Return Type Settings

        Return type settings are `DecoderSettings` applied when the return value is decoded

        Example: 
        
        ```
        fastDecode: true
        magicDecode: true 
        maxRecursion: 5
        decodeLimit: 100
        ```
  version: 1
  author: frooky dev
  platform: Android

# global settings for the hooks in this hook file.
globalSettings:
  hookSettings:
    hookTimeoutMs: 1111 # Timeout in ms frooky will try to hook in case something the target library is not available.
    stackTraceLimit: 0 # Sets stackTraceLimit to 10 for all hooks
    eventFilter: ['^libmyapp\.so'] # Stack trace filters to apply.
  decoderSettings:
    fastDecode: true # If set, the decoders are instructed to prioritize speed over details. Mostly, this mean avoiding expensive Frida <-> native roundtrip.
    magicDecode: true # If set, frooky tries to guess the type of a value in case it is not declared in the hook, or it is not possible to deduct it at runtime
    maxRecursion: 1 # Sets the cutoff limit for the recursion depth when decoding nested data structures, such as nested arrays, lists, sets, maps, structs etc.
    decodeLimit: 11 # Sets the limit of how many elements of a enumerable data structures, such as arrays, lists, dictionaries etc. are decoded

hookGroup:
  # simple function declaration
  - module: libreceiveFundamentalValue.so
    hooks:
      - receive_bool

  # object with ONLY symbol provided, technically the same form as the one before
  - module: libreceiveFundamentalValue.so
    hooks:
      - symbol: receive_short

  # PARTIAL local hook settings take priority over global setting, simple function declaration
  - module: libreceiveFundamentalValue.so
    hookSettings:
      hookTimeoutMs: 2000
    decoderSettings:
      decodeLimit: 22
    hooks:
      - receive_int
      - receive_char

  # PARTIAL local hook settings take priority over global setting, simple function declaration
  - module: libreceiveFundamentalValue.so
    hookSettings:
      hookTimeoutMs: 3000
    decoderSettings:
      decodeLimit: 33
    hooks:
      - symbol: receive_long

  # PARTIAL local hook settings take priority over global setting, object with ONLY symbol provided
  - module: libreceiveFundamentalValue.so
    hookSettings:
      hookTimeoutMs: 4000
    decoderSettings:
      decodeLimit: 44
    hooks:
      - receive_schar
      - receive_ullong

  # PARTIAL local parameter settings take priority over global setting, form [type, settings]
  - module: libreceiveFundamentalValue.so
    hooks:
      - symbol: receive_llong
        params:
          - [llong, { decodeLimit: 55 }]

  # PARTIAL local parameter settings take priority over global setting, form [type, name, settings]
  - module: libreceiveFundamentalValue.so
    hooks:
      - symbol: receive_ulong
        params:
          - [llong, astronomicUnit, { decodeLimit: 66 }]
