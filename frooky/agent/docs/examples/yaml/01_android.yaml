metadata:
  name: Android Hook Examples
  platform: Android
  description: Comprehensive examples of Java/Kotlin method hooking on Android
  masCategory: GENERAL
  author: Frooky Documentation
  version: v1

hooks:
  # EXAMPLE 1: Single Java method (no arguments)
  - javaClass: android.net.wifi.WifiManager
    methods:
      - name: getConnectionInfo

  # EXAMPLE 2: Multiple Java methods
  - javaClass: android.location.LocationManager
    methods:
      - name: getLastKnownLocation
      - name: isProviderEnabled
      - name: requestLocationUpdates
    stackTraceLimit: 10

  # EXAMPLE 3: Single overload
  - javaClass: java.net.URL
    methods:
      - name: openConnection
        overloads:
          - params:
              - type: java.net.Proxy

  # EXAMPLE 4: Multiple overloads
  - javaClass: android.content.Intent
    methods:
      - name: putExtra
        overloads:
          - params:
              - type: java.lang.String
                name: name
              - type: java.lang.String
                name: value
          - params:
              - type: java.lang.String
                name: name
              - type: int
                name: value
          - params:
              - type: java.lang.String
                name: name
              - type: boolean
                name: value
          - params:
              - type: java.lang.String
                name: name
              - type: "[B"
                name: value

  # EXAMPLE 5: Custom decoder for Java method argument
  - javaClass: android.content.Intent
    methods:
      - name: setFlags
        overloads:
          - params:
              - type: int
                name: flags
                decoder: IntentFlagsDecoder
    debug: true

  # EXAMPLE 6: Single Java Type as argument
  - javaClass: android.app.Activity
    methods:
      - name: startActivity
        overloads:
          - params:
              - type: android.content.Intent
                name: intent

  # EXAMPLE 7: Multiple Java Types as arguments
  - javaClass: android.database.sqlite.SQLiteDatabase
    methods:
      - name: query
        overloads:
          - params:
              - type: java.lang.String
                name: table
              - type: "[Ljava.lang.String"
                name: columns
              - type: java.lang.String
                name: selection
              - type: "[Ljava.lang.String"
                name: selectionArgs
              - type: java.lang.String
                name: groupBy
              - type: java.lang.String
                name: having
              - type: java.lang.String
                name: orderBy
    stackTraceLimit: 15
    stackTraceFilter:
      - "^java\\."
      - "^android\\."

  # EXAMPLE 8: Decode parameter at exit (data passed by reference)
  - javaClass: javax.crypto.Cipher
    methods:
      - name: doFinal
        overloads:
          - params:
              - type: "[B"
                name: output
                decodeAt: exit
              - type: int
                name: outputOffset

  # EXAMPLE 9: Decode parameter at both entry and exit
  - javaClass: java.nio.ByteBuffer
    methods:
      - name: put
        overloads:
          - params:
              - type: "[B"
                name: src
                decodeAt: both

  # EXAMPLE 10: Hook constructor
  - javaClass: android.webkit.WebView
    methods:
      - name: $init
      - name: loadUrl
