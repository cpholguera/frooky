metadata:
  name: Android Hook Examples
  platform: Android
  description: Comprehensive examples of Java/Kotlin method hooking on Android
  masCategory: GENERAL
  author: Frooky Documentation
  version: v1

hooks:
  # Single Java method
  - javaClass: android.net.wifi.WifiManager
    methods:
      - name: getConnectionInfo

  # Single Java method, shortened
  - javaClass: android.net.wifi.WifiManager
    methods:
      - getConnectionInfo

  # Hook constructor
  - javaClass: android.webkit.WebView
    methods:
      - $init

  # Multiple Java methods, shortened
  - javaClass: android.location.LocationManager
    methods:
      - getLastKnownLocation
      - isProviderEnabled
      - requestLocationUpdates
    stackTraceLimit: 10

  # Single overload
  - javaClass: java.net.URL
    methods:
      - name: openConnection
        overloads:
          - params:
              - java.net.Proxy

  # Multiple overloads
  - javaClass: android.content.Intent
    methods:
      - name: putExtra
        overloads:
          - params:
              - ["java.lang.String", name]
              - ["java.lang.String", value]
          - params:
              - ["java.lang.String", name]
              - [int, value]
          - params:
              - ["java.lang.String", name]
              - [boolean, value]
          - params:
              - ["java.lang.String", name]
              - ["[B", value]

  # Custom decoder for Java method argument and debug flag enabled for debug logs
  - javaClass: android.content.Intent
    methods:
      - name: setFlags
        overloads:
          - params:
              - [int, flags, { decoder: IntentFlagsDecoder }]
    debug: true

  # Single Java Type as argument
  - javaClass: android.app.Activity
    methods:
      - name: startActivity
        overloads:
          - params:
              - ["android.content.Intent", intent]

  # Multiple Java Types as arguments
  - javaClass: android.database.sqlite.SQLiteDatabase
    methods:
      - name: query
        overloads:
          - params:
              - ["java.lang.String", table]
              - ["[Ljava.lang.String", columns]
              - ["java.lang.String", selection]
              - ["[Ljava.lang.String", selectionArgs]
              - ["java.lang.String", groupBy]
              - ["java.lang.String", having]
              - ["java.lang.String", orderBy]
    stackTraceLimit: 15
    stackTraceFilter:
      - "^java\\."
      - "^android\\."

  # Decode parameter at exit (data passed by reference)
  - javaClass: javax.crypto.Cipher
    methods:
      - name: doFinal
        overloads:
          - params:
              - ["[B", output, { decodeAt: exit }]
              - [int, outputOffset]

  # Decode parameter at both entry and exit
  - javaClass: java.nio.ByteBuffer
    methods:
      - name: put
        overloads:
          - params:
              - ["[B", src, { decodeAt: both }]
