metadata:
  name: Native Hook Examples
  platform: Android
  description: Examples of native C/C++ function hooking
  masCategory: GENERAL
  author: Frooky Documentation
  version: v1

hooks:
  # Only alert when the function is called, no decoding
  - module: libc.so
    functions:
      - name: open
      - name: close


  # Only alert when the function is called, no decoding, shortened
  - module: libc.so
    functions:
      - open
      - close

  # Simple native function with basic types
  - module: libc.so
    functions:
      - symbol: open
        returnType: int
        params:
          - [ "const char *", pathname ]
          - [ int, flags ]
          - [ mode_t, mode ]

  # Function with pointer and buffer
  - module: libc.so
    functions:
      - symbol: read
        returnType: ssize_t
        params:
          - [ int, fd ]
          - [ "void *", buf, { decodeAt: exit, decoderArgs: [ count ] } ]
          - [ size_t, count ]

  # OpenSSL encryption function, ctx contains information about the used algorithms
  - module: libssl.so
    functions:
      - symbol: EVP_EncryptInit_ex
        returnType: int
        params:
          - [ "EVP_CIPHER_CTX *", ctx ]
          - [ "const EVP_CIPHER *", type ]
          - [ "ENGINE *", impl ]
          - [ "const unsigned char *", key, { decoderArgs: [ ctx ]  } ]
          - [ "const unsigned char *", iv, { decoderArgs: [ ctx ] } ]
    stackTraceLimit: 10

  # SSL write with buffer
  - module: libssl.so
    functions:
      - symbol: SSL_write
        returnType: int
        params:
          - [ "SSL *", ssl ]
          - [ "const void *", buf ]
          - [ int, num ]
    debug: true

  # Multiple functions in same module
  - module: libssl.so
    functions:
      - symbol: ENGINE_load_builtin_engines
      - symbol: ENGINE_cleanup
      - symbol: OSSL_CMP_validate_cert_path
        returnType: int
        params:
          - [ "const OSSL_CMP_CTX *", ctx ]
          - [ "X509_STORE *", trusted_store ]
          - [ "X509 *", cert ]

  # Function with custom decoder
  - module: libcustom.so
    functions:
      - symbol: process_data
        returnType: int
        params:
          - [ "void *", data, { decoder: CustomDataDecoder, decoderArgs: [ size ] } ]
          - [ size_t, size ]

  # Function with output parameter decoded at exit
  - module: libcustom.so
    functions:
      - symbol: get_buffer
        returnType: int
        params:
          - [ "unsigned char *", output, { decodeAt: exit } ]
          - [ size_t, size ]
