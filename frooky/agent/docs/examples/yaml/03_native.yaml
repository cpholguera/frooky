metadata:
  name: Native Hook Examples
  platform: Android
  description: Examples of native C/C++ function hooking
  masCategory: GENERAL
  author: Frooky Documentation
  version: v1

hooks:
  # EXAMPLE 1: Simple native function with basic types
  - module: libc.so
    functions:
      - symbol: open
        returnType: int
        params:
          - [ "const char *", pathname ]
          - [ int, flags ]
          - [ mode_t, mode ]

  # EXAMPLE 2: Function with pointer and buffer
  - module: libc.so
    functions:
      - symbol: read
        returnType: ssize_t
        params:
          - [ int, fd ]
          - [ "void *", buf, { decodeAt: exit } ]
          - [ size_t, count ]

  # EXAMPLE 3: OpenSSL encryption function
  - module: libcrypto.so
    functions:
      - symbol: EVP_EncryptInit_ex
        returnType: int
        params:
          - [ "EVP_CIPHER_CTX *", ctx ]
          - [ "const EVP_CIPHER *", type ]
          - [ "ENGINE *", impl ]
          - [ "const unsigned char *", key ]
          - [ "const unsigned char *", iv ]
    stackTraceLimit: 10

  # EXAMPLE 4: SSL write with buffer
  - module: libssl.so
    functions:
      - symbol: SSL_write
        returnType: int
        params:
          - [ "SSL *", ssl ]
          - [ "const void *", buf ]
          - [ int, num ]
    debug: true

  # EXAMPLE 5: Multiple functions in same module
  - module: libssl.so
    functions:
      - symbol: ENGINE_load_builtin_engines
      - symbol: ENGINE_cleanup
      - symbol: OSSL_CMP_validate_cert_path
        returnType: int
        params:
          - [ "const OSSL_CMP_CTX *", ctx ]
          - [ "X509_STORE *", trusted_store ]
          - [ "X509 *", cert ]

  # EXAMPLE 6: Function with custom decoder
  - module: libcustom.so
    functions:
      - symbol: process_data
        returnType: int
        params:
          - [ "void *", data, { decoder: CustomDataDecoder } ]
          - [ size_t, size ]

  # EXAMPLE 7: Function with output parameter decoded at exit
  - module: libexample.so
    functions:
      - symbol: get_buffer
        returnType: int
        params:
          - [ "unsigned char *", output, { decodeAt: exit } ]
          - [ size_t, size ]
