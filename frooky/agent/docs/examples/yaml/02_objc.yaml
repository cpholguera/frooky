metadata:
  name: Objective-C Hook Examples
  platform: iOS
  description: Examples of Objective-C method hooking
  masCategory: GENERAL
  author: Frooky Documentation
  version: v1

hooks:
  # LAContext biometry method (no param decoding)
  - objcClass: LAContext
    methods:
      - name: "- invalidate"

  # LAContext biometry method (shortened, no param decoding)
  - objcClass: LAContext
    methods:
      - "- invalidate"

  # Simple Objective-C instance method
  - objcClass: NSUserDefaults
    methods:
      - name: "- setObject:forKey:"
        params:
          - ["(id)", value]
          - ["(NSString *)", key]

  # NSData write to file with return type
  - objcClass: NSData
    methods:
      - name: "- writeToFile:atomically:"
        returnType: "(BOOL)"
        params:
          - ["(NSString *)", path]
          - ["(BOOL)", useAuxiliaryFile]
    stackTraceLimit: 8

  # Objective-C class method
  - objcClass: NSURL
    methods:
      - name: "+ fileURLWithFileSystemRepresentation:isDirectory:relativeToURL:"
        returnType: "(NSURL *)"
        params:
          - ["(const char *)", path]
          - ["(BOOL)", isDir]
          - ["(NSURL *)", baseURL]

  # Multiple methods in same class
  - objcClass: LAPrivateKey
    methods:
      - name: "- decryptData:secKeyAlgorithm:completion:"
        params:
          - ["(NSData *)", data]
          - ["(SecKeyAlgorithm)", algorithm]
          - [
              "(void (^)(NSData *, NSError *))",
              handler,
              { decoder: LaPlaintextDecoder },
            ]
      - name: "- signData:secKeyAlgorithm:completion:"
        params:
          - ["(NSData *)", data]
          - ["(SecKeyAlgorithm)", algorithm]
          - ["(void (^)(NSData *, NSError *))", handler]

  # CoreData save with output parameter
  - objcClass: NSManagedObjectContext
    methods:
      - name: "- save:"
        returnType: "(BOOL)"
        params:
          - ["(NSError **)", error, { decodeAt: exit }]
    debug: true

  # Network request with stack trace filtering
  - objcClass: NSURLSession
    methods:
      - name: "- dataTaskWithRequest:completionHandler:"
        returnType: "(NSURLSessionDataTask *)"
        params:
          - ["(NSURLRequest *)", request]
          - [
              "(void (^)(NSData *, NSURLResponse *, NSError *))",
              completionHandler,
            ]
    stackTraceFilter:
      - "^libsystem_"
      - "^Foundation"

  # Method with both entry and exit decoding
  - objcClass: NSMutableData
    methods:
      - name: "- appendData:"
        params:
          - ["(NSData *)", data, { decodeAt: both }]
